<!DOCTYPE html>
<html>
<head>

<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<style>
    body{
background:#f5f6f7;
font-family: Arial;
}

/* HERO */

.hero{
padding:60px;
}

.hero-img{
width:100%;
max-width:700px;
margin-top:20px;
border-radius:10px;
}

/* CARDS */

.card{
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img{
height:200px;
object-fit:cover;
}

/* LOGIN IMAGE */

.login-img{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

/* BANNER */

.banner-img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
margin-bottom:20px;
}

/* CONTACT IMAGE */

.contact-img{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

/* FOOTER */

.footer{
background:#212529;
color:white;
padding:40px;
}

.footer a{
color:#ddd;
text-decoration:none;
}

.footer a:hover{
color:white;
}
</style>
</head>

<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3"
class="contact-img">

</ul>

</div>

</nav>


<div class="container mt-5" style="max-width:500px">

<h3>Contact Us</h3>

<form>

<div class="mb-3">

<label>Name</label>

<input type="text" class="form-control" required>

</div>

<div class="mb-3">

<label>Email</label>

<input type="email" class="form-control" required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea class="form-control" required></textarea>

</div>

<button class="btn btn-success">Submit</button>

</form>

</div>
